<!DOCTYPE html>
<html>
<head>
<title>Secret 😳</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(-45deg,#fff0f6,#ffd6e0,#ffe3ec);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

svg{
width:150px;
margin-bottom:20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff6f91;
color:white;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}
</style>
</head>

<body>

<!-- SOUND -->
<audio id="cuteSound" autoplay>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_cute_pop.mp3" type="audio/mpeg">
</audio>

<svg viewBox="0 0 200 200">
<circle cx="100" cy="110" r="50" fill="#fff" stroke="#333" stroke-width="4"/>
<circle cx="60" cy="60" r="25" fill="#fff" stroke="#333" stroke-width="4"/>
<circle cx="140" cy="60" r="25" fill="#fff" stroke="#333" stroke-width="4"/>
<circle cx="85" cy="105" r="6" fill="#333"/>
<circle cx="115" cy="105" r="6" fill="#333"/>
<ellipse cx="100" cy="125" rx="12" ry="8" fill="#333"/>
<circle cx="75" cy="120" r="8" fill="#ff9eb5"/>
<circle cx="125" cy="120" r="8" fill="#ff9eb5"/>
</svg>

<h2>Hehe… I knew it 😳🐻💕</h2>

<button onclick="location.href='index.html'">Go Back</button>

<script>
function createHeart(){
let heart=document.createElement("div");
heart.innerHTML="💖";
heart.style.position="absolute";
heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";
heart.style.fontSize="20px";
heart.style.animation="floatUp 6s linear";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,2000);
</script>

</body>
</html>
